<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="1; url=index.html?tab=ds-club">
    <title>Redirecting to Data Science Club...</title>
    <style>
        body {
            background-color: #090d16;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.05);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #ea580c;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        a {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting to the Data Science Club at Nexus Studio...</p>
        <p>If you are not redirected automatically, <a href="index.html?tab=ds-club">click here</a>.</p>
    </div>
    <script>
        window.location.href = "index.html?tab=ds-club";
    </script>
</body>
</html>
